# Using GITHUB_TOKEN
name: Open a new issue

on: workflow_dispatch

jobs:
  open-new-issue:
    runs-on: ubuntu-latest

    permissions: 
      contents: read
      issues: write

    steps:
      - run: |
          gh issue --repo ${{ github.repository }} \
            create --title "Issue from job name ${{ github.job }}" \
            --body "${{ github.actor }} triggered the creation of this issue. Github bot created it for itself"

        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
